<header class="small">
  <img src="/scparfums/Logo.png" alt="SC Parfums">
  <nav>
    <a href="/scparfums/index.html">Inicio</a>
    <a href="/scparfums/categorias.html">Categorías</a>
    <a href="/scparfums/populares.html">Más Populares</a>
    <a href="/scparfums/nuevo.html">Lo Nuevo</a>
    <a href="/scparfums/ofertas.html">Ofertas</a>
    <a href="#contacto">Contacto</a>
  </nav>
  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Buscar fragancia...">
    <div id="searchSuggestions" class="suggestions"></div>
  </div>
</header>

<script>
document.addEventListener("DOMContentLoaded", () => {
  const searchInput = document.getElementById("searchInput");
  const suggestionsBox = document.getElementById("searchSuggestions");
  let perfumesCache = [];

  // Cargar perfumes.json una sola vez
  fetch("/scparfums/data/perfumes.json")
    .then(resp => resp.json())
    .then(data => { perfumesCache = data; })
    .catch(err => console.error("Error cargando perfumes:", err));

  searchInput.addEventListener("input", () => {
    const query = searchInput.value.trim().toLowerCase();
    suggestionsBox.innerHTML = "";
    if (!query) {
      suggestionsBox.style.display = "none";
      return;
    }

    const resultados = perfumesCache.filter(p =>
      p.nombre.toLowerCase().includes(query) ||
      p.marca.toLowerCase().includes(query)
    ).slice(0, 10); // máximo 10 sugerencias

    if (resultados.length === 0) {
      suggestionsBox.style.display = "none";
      return;
    }

    resultados.forEach(perfume => {
      const item = document.createElement("div");
      item.textContent = perfume.marca + " - " + perfume.nombre;
      item.addEventListener("click", () => {
        window.location.href = "/scparfums/" + perfume.pagina;
      });
      suggestionsBox.appendChild(item);
    });

    suggestionsBox.style.display = "block";
  });

  // Ocultar sugerencias si se hace clic fuera
  document.addEventListener("click", (e) => {
    if (!searchInput.contains(e.target) && !suggestionsBox.contains(e.target)) {
      suggestionsBox.style.display = "none";
    }
  });
});
</script>
