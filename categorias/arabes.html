<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Fragancias Árabes - SC Parfums</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../css/styles-base.css">
</head>
<body>

<div id="header"></div>

<section class="hero">
  <div class="hero-text">Fragancias Árabes</div>
</section>

<section class="layout">
  <aside class="sidebar"></aside>
  <main class="perfumes" id="perfume-list"></main>
</section>

<footer>
  © 2026 SC Parfums | Paraguay<br>
  Productos 100% originales | Medios de pago disponibles<br>
  Seguinos en 
  <a href="https://www.facebook.com/SCParfums">Facebook</a> |
  <a href="https://www.instagram.com/scparfumspy">Instagram</a> |
  <a href="https://www.tiktok.com/@scparfums">TikTok</a> |
  <a href="https://wa.me/595991861112">WhatsApp</a>
</footer>

<script src="../data/config.js"></script>
<script>
async function cargarPerfumes() {
  const contenedor = document.getElementById('perfume-list');
  const sidebar = document.querySelector('.sidebar');

  contenedor.innerHTML = '<p id="loader">Cargando fragancias árabes...</p>';

  try {
    const respuesta = await fetch('../data/perfumes.json');
    const perfumes = await respuesta.json();

    const preciosResp = await fetch(CONFIG.preciosURL);
    const precios = await preciosResp.json();

    contenedor.innerHTML = '';

    // Filtrar por categoria2 = "Árabes"
    const arabes = perfumes.filter(p => {
      if (!p.categoria2) return false;
      const cat = p.categoria2
        .toLowerCase()
        .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
        .trim();
      return cat === "arabes";
    }).sort((a, b) => a.nombre.localeCompare(b.nombre, 'es', { sensitivity: 'base' }));

    const perfumesPorPagina = 20;
    let paginaActual = 1;

    function mostrarPagina(pagina, lista = arabes) {
      contenedor.innerHTML = '';
      const inicio = (pagina - 1) * perfumesPorPagina;
      const fin = inicio + perfumesPorPagina;
      const perfumesPagina = lista.slice(inicio, fin);

      if (perfumesPagina.length === 0) {
        contenedor.innerHTML = '<p>No se encontraron perfumes en esta categoría.</p>';
        return;
      }

      perfumesPagina.forEach(perfume => {
        const precioData = precios.find(pr => pr.id === perfume.id);
        let precio = "Consultar";
        if (precioData && precioData.precio != null) {
          precio = "₲ " + precioData.precio.toLocaleString("es-PY");
        }

        const tarjeta = document.createElement('div');
        tarjeta.className = 'perfume-card';
        tarjeta.setAttribute('data-marca', perfume.marca);

        const enlace = document.createElement('a');
        enlace.href = `../${perfume.pagina}`;
        enlace.innerHTML = `
          <img src="../${perfume.imagen}" alt="${perfume.nombre}">
          <p><strong>${perfume.marca}</strong> - ${perfume.nombre}</p>
          <p class="precio">${precio}</p>
        `;

        tarjeta.appendChild(enlace);
        contenedor.appendChild(tarjeta);
      });

      renderizarBotones(lista);
    }

    function renderizarBotones(lista) {
      let topContainer = document.getElementById('botones-paginacion-top');
      if (!topContainer) {
        topContainer = document.createElement('div');
        topContainer.id = 'botones-paginacion-top';
        contenedor.parentNode.insertBefore(topContainer, contenedor);
      }

      let bottomContainer = document.getElementById('botones-paginacion-bottom');
      if (!bottomContainer) {
        bottomContainer = document.createElement('div');
        bottomContainer.id = 'botones-paginacion-bottom';
        contenedor.parentNode.appendChild(bottomContainer);
      }

      [topContainer, bottomContainer].forEach(container => {
        container.innerHTML = '';

        const btnInicio = document.createElement('button');
        btnInicio.textContent = 'Inicio';
        btnInicio.onclick = () => {
          paginaActual = 1;
          mostrarPagina(paginaActual, lista);
        };
        container.appendChild(btnInicio);

        if (paginaActual > 1) {
          const btnAnterior = document.createElement('button');
          btnAnterior.textContent = 'Anterior';
          btnAnterior.onclick = () => {
            paginaActual--;
            mostrarPagina(paginaActual, lista);
          };
          container.appendChild(btnAnterior);
        }

        if (paginaActual * perfumesPorPagina < lista.length) {
          const btnSiguiente = document.createElement('button');
          btnSiguiente.textContent = 'Siguiente';
          btnSiguiente.onclick = () => {
            paginaActual++;
            mostrarPagina(paginaActual, lista);
          };
          container.appendChild(btnSiguiente);
        }
      });
    }

    // Mostrar la primera página al cargar
    mostrarPagina(paginaActual, arabes);

    // Sidebar dinámico con marcas
    const marcasUnicas = [...new Set(arabes.map(p => p.marca))];
    const marcasContainer = document.createElement('div');
    marcasContainer.innerHTML = "<h3>Marcas</h3>";

    marcasUnicas.forEach(marca => {
      const label = document.createElement('label');
      label.innerHTML = `<input type="checkbox" value="${marca}"> ${marca}`;
      marcasContainer.appendChild(label);
    });

    sidebar.innerHTML = '';
    sidebar.appendChild(marcasContainer);

    const checkboxes = marcasContainer.querySelectorAll('input[type="checkbox"]');
    checkboxes.forEach(checkbox => {
      checkbox.addEventListener('change', () => {
        const seleccionadas = [...checkboxes]
          .filter(cb => cb.checked)
          .map(cb => cb.value);

        const filtrados = arabes.filter(p => seleccionadas.length === 0 || seleccionadas.includes(p.marca));
        paginaActual = 1;
        mostrarPagina(paginaActual, filtrados);
      });
    });

  } catch (error) {
    console.error("Error cargando perfumes:", error);
    contenedor.innerHTML = '<p>Error al cargar perfumes.</p>';
  }
}

cargarPerfumes();
</script>

</body>
</html>
