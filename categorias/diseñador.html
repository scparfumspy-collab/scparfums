<html lang="es">

<body>

<!-- Header dinámico -->
<div id="header"></div>
<script>
  fetch('../header.html')
    .then(resp => resp.text())
    .then(html => {
      document.getElementById('header').innerHTML = html;
      initHeaderSearch(); // buscador igual que en árabes
    });

  // Función de buscador (igual que en árabes)
  function initHeaderSearch() {
    const searchInput = document.getElementById("searchInput");
    const searchButton = document.getElementById("searchButton");
    const suggestionsBox = document.getElementById("searchSuggestions");
    let perfumesCache = [];

    if (!searchInput || !searchButton || !suggestionsBox) return;

    fetch("../data/perfumes.json")
      .then(resp => resp.json())
      .then(data => { perfumesCache = data; })
      .catch(err => console.error("Error cargando perfumes:", err));

    searchInput.addEventListener("input", () => {
      const query = searchInput.value.trim().toLowerCase();
      suggestionsBox.innerHTML = "";
      if (!query) {
        suggestionsBox.style.display = "none";
        return;
      }

      const resultados = perfumesCache.filter(p =>
        p.nombre.toLowerCase().includes(query) ||
        p.marca.toLowerCase().includes(query)
      ).slice(0, 10);

      if (resultados.length === 0) {
        suggestionsBox.style.display = "none";
        return;
      }

      resultados.forEach(perfume => {
        const item = document.createElement("div");
        item.textContent = perfume.marca + " - " + perfume.nombre;
        item.addEventListener("click", () => {
          window.location.href = "/scparfums/" + perfume.pagina;
        });
        suggestionsBox.appendChild(item);
      });

      suggestionsBox.style.display = "block";
    });

    searchButton.addEventListener("click", () => {
      const query = searchInput.value.trim().toLowerCase();
      if (query) {
        window.location.href = "/scparfums/buscar.html?q=" + encodeURIComponent(query);
      }
    });

    document.addEventListener("click", (e) => {
      if (!searchInput.contains(e.target) && !suggestionsBox.contains(e.target)) {
        suggestionsBox.style.display = "none";
      }
    });
  }
</script>

<section class="hero">
  <div class="hero-text">Fragancias de Diseñador</div>
</section>

<section class="layout">
  <aside class="sidebar"></aside>
  <main class="perfumes-wrapper">
    <div id="botones-paginacion-top" class="botones-paginacion"></div>
    <div class="perfumes" id="perfume-list"></div>
    <div id="botones-paginacion-bottom" class="botones-paginacion"></div>
  </main>
</section>

<script src="../data/config.js"></script>
<script src="../js/render.js"></script>

<script>
async function cargarPerfumes() {
  const contenedor = document.getElementById('perfume-list');
  const sidebar = document.querySelector('.sidebar');

  contenedor.innerHTML = '<p id="loader">Cargando fragancias de diseñador...</p>';

  try {
    const respuesta = await fetch('../data/perfumes.json');
    const perfumes = await respuesta.json();

    const preciosResp = await fetch(CONFIG.preciosURL);
    const precios = await preciosResp.json();

    const ofertasResp = await fetch('../data/ofertas.json');
    const ofertas = await ofertasResp.json();

    contenedor.innerHTML = '';

    // Filtrar por categoria2 = "Diseñador"
    const disenador = perfumes.filter(p => {
      if (!p.categoria2) return false;
      const cat = p.categoria2
        .toLowerCase()
        .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
        .trim();
      return cat === "diseñador";
    }).sort((a, b) => a.nombre.localeCompare(b.nombre, 'es', { sensitivity: 'base' }));

    const perfumesPorPagina = 20;
    let paginaActual = 1;

    function mostrarPagina(pagina, lista = disenador) {
      contenedor.innerHTML = '';
      const inicio = (pagina - 1) * perfumesPorPagina;
      const fin = inicio + perfumesPorPagina;
      const perfumesPagina = lista.slice(inicio, fin);

      if (perfumesPagina.length === 0) {
        contenedor.innerHTML = '<p>No se encontraron perfumes en esta categoría.</p>';
        return;
      }

      perfumesPagina.forEach(perfume => {
        const tarjeta = renderTarjeta(perfume, precios, ofertas);
        contenedor.appendChild(tarjeta);
      });

      renderizarBotones(lista);
    }

    function renderizarBotones(lista) {
      const topContainer = document.getElementById('botones-paginacion-top');
      const bottomContainer = document.getElementById('botones-paginacion-bottom');

      [topContainer, bottomContainer].forEach(container => {
        container.innerHTML = '';

        const btnInicio = document.createElement('button');
        btnInicio.textContent = 'Inicio';
        btnInicio.onclick = () => {
          paginaActual = 1;
          mostrarPagina(paginaActual, lista);
        };
        container.appendChild(btnInicio);

        if (paginaActual > 1) {
          const btnAnterior = document.createElement('button');
          btnAnterior.textContent = 'Anterior';
          btnAnterior.onclick = () => {
            paginaActual--;
            mostrarPagina(paginaActual, lista);
          };
          container.appendChild(btnAnterior);
        }

        if (paginaActual * perfumesPorPagina < lista.length) {
          const btnSiguiente = document.createElement('button');
          btnSiguiente.textContent = 'Siguiente';
          btnSiguiente.onclick = () => {
            paginaActual++;
            mostrarPagina(paginaActual, lista);
          };
          container.appendChild(btnSiguiente);
        }
      });
    }

    // Mostrar la primera página al cargar
    mostrarPagina(paginaActual, disenador);

    // Sidebar dinámico con marcas
    const marcasUnicas = [...new Set(disenador.map(p => p.marca))];
    const marcasContainer = document.createElement('div');
    marcasContainer.innerHTML = "<h3>Marcas</h3>";

    marcasUnicas.forEach(marca => {
      const label = document.createElement('label');
      label.innerHTML = `<input type="checkbox" value="${marca}"> ${marca}`;
      marcasContainer.appendChild(label);
    });

    sidebar.innerHTML = '';
    sidebar.appendChild(marcasContainer);

    const checkboxes = marcasContainer.querySelectorAll('input[type="checkbox"]');
    checkboxes.forEach(checkbox => {
      checkbox.addEventListener('change', () => {
        const seleccionadas = [...checkboxes]
          .filter(cb => cb.checked)
          .map(cb => cb.value);

        const filtrados = disenador.filter(p => seleccionadas.length === 0 || seleccionadas.includes(p.marca));
        paginaActual = 1;
        mostrarPagina(paginaActual, filtrados);
      });
    });

  } catch (error) {
    console.error("Error cargando perfumes:", error);
    contenedor.innerHTML = '<p>Error al cargar perfumes.</p>';
  }
}

cargarPerfumes();
</script>

</body>
</html>
